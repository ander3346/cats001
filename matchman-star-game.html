<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchman Attain Star Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            margin: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 2em;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: white;
            font-weight: bold;
        }

        .card:hover:not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .card.flipped {
            background: white;
            color: #333;
            border: 2px solid #667eea;
        }

        .card.matched {
            background: #ffd700;
            cursor: default;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .card.matched:hover {
            transform: none;
        }

        .game-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .game-message {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            min-height: 30px;
        }

        .stars {
            text-align: center;
            font-size: 3em;
            margin: 20px 0;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .game-over-content h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .game-over-content .stars {
            margin: 20px 0;
        }

        .game-over-content p {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }

            .game-header h1 {
                font-size: 1.8em;
            }

            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .card {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🎮 Matchman Star Game</h1>
            <p>Match the pairs and collect stars!</p>
        </div>

        <div class="game-stats">
            <div class="stat-box">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Matched</div>
                <div class="stat-value" id="matched">0/8</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Stars</div>
                <div class="stat-value" id="stars">⭐0</div>
            </div>
        </div>

        <div class="game-message" id="message"></div>

        <div class="game-board" id="gameBoard"></div>

        <div class="game-controls">
            <button class="btn-primary" onclick="resetGame()">New Game</button>
            <button class="btn-secondary" onclick="showInstructions()">Instructions</button>
        </div>
    </div>

    <div class="game-over" id="gameOverModal">
        <div class="game-over-content">
            <h2 id="gameOverTitle">You Won! 🎉</h2>
            <div class="stars" id="finalStars"></div>
            <p id="gameOverStats"></p>
            <button class="btn-primary" onclick="resetGame()" style="margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script src="matchman-star-game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Game</title>
    <link rel="stylesheet" href="mario.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🍄 Mario Game 🍄</h1>
            <div class="info">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="coins">Coins: <span id="coins">0</span></div>
                <div class="level">Level: <span id="level">1</span></div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- Mario will be added here -->
            <!-- Enemies will be added here -->
            <!-- Coins will be added here -->
        </div>

        <div class="controls">
            <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move</p>
            <p><strong>Space</strong> to jump</p>
            <p><strong>R</strong> to restart</p>
            <button class="start-btn" id="startBtn">Start Game</button>
            <button class="pause-btn" id="pauseBtn">Pause</button>
        </div>

        <div class="game-over" id="gameOver" style="display: none;">
            <div class="game-over-content">
                <h2 id="gameOverText">Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button class="restart-btn" id="restartBtn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="mario.js"></script>
</body>
</html>

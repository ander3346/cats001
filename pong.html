<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 400px;
            background: #000;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .scoreboard {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            z-index: 10;
        }

        .player-score,
        .computer-score {
            text-align: center;
            flex: 1;
        }

        .divider {
            width: 2px;
            height: 300px;
            background: #fff;
            opacity: 0.3;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .paddle {
            position: absolute;
            width: 10px;
            height: 100px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .player-paddle {
            left: 10px;
        }

        .computer-paddle {
            right: 10px;
        }

        .ball {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
            display: none;
        }

        .game-over h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .game-over button:hover {
            background: #ccc;
        }

        .instructions {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: #aaa;
            font-size: 12px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <div class="player-score">Player: <span id="playerScore">0</span></div>
            <div class="computer-score">Computer: <span id="computerScore">0</span></div>
        </div>

        <div class="divider"></div>

        <div class="paddle player-paddle" id="playerPaddle"></div>
        <div class="paddle computer-paddle" id="computerPaddle"></div>
        <div class="ball" id="ball"></div>

        <div class="game-over" id="gameOver">
            <h1>Game Over!</h1>
            <p id="gameOverMessage"></p>
            <button onclick="location.reload()">Play Again</button>
        </div>

        <div class="instructions">
            Use ARROW KEYS or MOUSE to move the left paddle • First to 5 points wins
        </div>
    </div>

    <script>
        const gameContainer = document.querySelector('.game-container');
        const playerPaddle = document.getElementById('playerPaddle');
        const computerPaddle = document.getElementById('computerPaddle');
        const ball = document.getElementById('ball');
        const playerScoreDisplay = document.getElementById('playerScore');
        const computerScoreDisplay = document.getElementById('computerScore');
        const gameOverScreen = document.getElementById('gameOver');
        const gameOverMessage = document.getElementById('gameOverMessage');

        // Game variables
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const PADDLE_HEIGHT = 100;
        const PADDLE_WIDTH = 10;
        const BALL_SIZE = 10;
        const PADDLE_SPEED = 6;
        const BALL_SPEED = 4;
        const WIN_SCORE = 5;

        let gameRunning = true;

        // Paddle positions
        let playerPaddleY = GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2;
        let computerPaddleY = GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2;

        // Ball position and velocity
        let ballX = GAME_WIDTH / 2 - BALL_SIZE / 2;
        let ballY = GAME_HEIGHT / 2 - BALL_SIZE / 2;
        let ballVelX = BALL_SPEED;
        let ballVelY = BALL_SPEED;

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Keyboard state
        const keys = {};
        let mouseY = GAME_HEIGHT / 2;

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = gameContainer.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Update player paddle position
        function updatePlayerPaddle() {
            // Use mouse position as primary control
            let newY = mouseY - PADDLE_HEIGHT / 2;

            // Allow arrow key override
            if (keys['ArrowUp']) {
                newY -= PADDLE_SPEED;
            }
            if (keys['ArrowDown']) {
                newY += PADDLE_SPEED;
            }

            // Keep paddle in bounds
            playerPaddleY = Math.max(0, Math.min(newY, GAME_HEIGHT - PADDLE_HEIGHT));
            playerPaddle.style.top = playerPaddleY + 'px';
        }

        // Update computer paddle (AI)
        function updateComputerPaddle() {
            const computerPaddleCenter = computerPaddleY + PADDLE_HEIGHT / 2;
            const difficulty = 0.04;

            if (computerPaddleCenter < ballY - 35) {
                computerPaddleY += PADDLE_SPEED;
            } else if (computerPaddleCenter > ballY + 35) {
                computerPaddleY -= PADDLE_SPEED;
            }

            // Keep paddle in bounds
            computerPaddleY = Math.max(0, Math.min(computerPaddleY, GAME_HEIGHT - PADDLE_HEIGHT));
            computerPaddle.style.top = computerPaddleY + 'px';
        }

        // Update ball position
        function updateBall() {
            ballX += ballVelX;
            ballY += ballVelY;

            // Ball collision with top and bottom walls
            if (ballY <= 0 || ballY + BALL_SIZE >= GAME_HEIGHT) {
                ballVelY = -ballVelY;
                ballY = Math.max(0, Math.min(ballY, GAME_HEIGHT - BALL_SIZE));
            }

            // Ball collision with paddles
            // Player paddle collision
            if (
                ballX <= playerPaddle.offsetLeft + PADDLE_WIDTH &&
                ballY + BALL_SIZE >= playerPaddleY &&
                ballY <= playerPaddleY + PADDLE_HEIGHT
            ) {
                ballVelX = -ballVelX;
                ballX = playerPaddle.offsetLeft + PADDLE_WIDTH;

                // Add spin based on where ball hits paddle
                const collidePoint = ballY - (playerPaddleY + PADDLE_HEIGHT / 2);
                ballVelY = (collidePoint / (PADDLE_HEIGHT / 2)) * BALL_SPEED;
            }

            // Computer paddle collision
            if (
                ballX + BALL_SIZE >= computerPaddle.offsetLeft &&
                ballY + BALL_SIZE >= computerPaddleY &&
                ballY <= computerPaddleY + PADDLE_HEIGHT
            ) {
                ballVelX = -ballVelX;
                ballX = computerPaddle.offsetLeft - BALL_SIZE;

                // Add spin based on where ball hits paddle
                const collidePoint = ballY - (computerPaddleY + PADDLE_HEIGHT / 2);
                ballVelY = (collidePoint / (PADDLE_HEIGHT / 2)) * BALL_SPEED;
            }

            // Ball out of bounds (left side)
            if (ballX < 0) {
                computerScore++;
                resetBall();
                checkGameOver();
            }

            // Ball out of bounds (right side)
            if (ballX > GAME_WIDTH) {
                playerScore++;
                resetBall();
                checkGameOver();
            }

            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }

        // Reset ball to center
        function resetBall() {
            ballX = GAME_WIDTH / 2 - BALL_SIZE / 2;
            ballY = GAME_HEIGHT / 2 - BALL_SIZE / 2;
            ballVelX = (Math.random() > 0.5 ? 1 : -1) * BALL_SPEED;
            ballVelY = (Math.random() - 0.5) * BALL_SPEED * 2;

            playerScoreDisplay.textContent = playerScore;
            computerScoreDisplay.textContent = computerScore;
        }

        // Check if game is over
        function checkGameOver() {
            if (playerScore >= WIN_SCORE) {
                endGame('You Win! 🎉');
            } else if (computerScore >= WIN_SCORE) {
                endGame('Computer Wins! 🤖');
            }
        }

        // End game
        function endGame(message) {
            gameRunning = false;
            gameOverMessage.textContent = message;
            gameOverScreen.style.display = 'block';
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
            }
            requestAnimationFrame(gameLoop);
        }

        // Initialize game
        playerPaddle.style.top = playerPaddleY + 'px';
        computerPaddle.style.top = computerPaddleY + 'px';
        ball.style.left = ballX + 'px';
        ball.style.top = ballY + 'px';

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
